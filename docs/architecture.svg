<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">algoscopeのアーキテクチャ</title>
  <desc id="desc">アルゴリズムは操作トレースを生成し、Playerがそれを1ステップずつ適用してSVGへ描く。算出と描画を分けている。</desc>
  <style>
    svg {
      --paper: #f4f4f1; --ink: #1e2228; --muted: #6a7079; --line: #cfd0c9; --accent: #4d5fcc;
      font-family: 'Hiragino Sans', 'Noto Sans JP', system-ui, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      svg { --paper: #15171c; --ink: #e7e9ec; --muted: #98a0ab; --line: #343a43; --accent: #8fa0f4; }
    }
    .kicker { font-size: 12px; letter-spacing: 3px; fill: var(--muted); }
    .h1 { font-size: 22px; font-weight: 700; fill: var(--ink); }
    .node { fill: none; stroke: var(--line); stroke-width: 1.25; }
    .node-accent { fill: none; stroke: var(--accent); stroke-width: 1.5; }
    .name { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 14px; fill: var(--ink); }
    .name-accent { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 14px; font-weight: 600; fill: var(--accent); }
    .sub { font-size: 11.5px; fill: var(--muted); }
    .flow { fill: none; stroke: var(--accent); stroke-width: 1.5; }
  </style>
  <defs>
    <marker id="head" viewBox="0 0 10 10" markerWidth="7" markerHeight="7" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="var(--accent)"/>
    </marker>
  </defs>

  <rect width="900" height="300" fill="var(--paper)"/>
  <text class="kicker" x="40" y="46">DATA FLOW</text>
  <text class="h1" x="39" y="76">算出と描画を分ける</text>

  <rect class="node-accent" x="40" y="120" width="178" height="58" rx="8"/>
  <text class="name-accent" x="58" y="146">sorts.ts</text>
  <text class="sub" x="58" y="166">6アルゴリズムのトレース</text>

  <rect class="node-accent" x="40" y="200" width="178" height="58" rx="8"/>
  <text class="name-accent" x="58" y="226">graphsearch.ts</text>
  <text class="sub" x="58" y="246">BFS / DFS / ダイクストラ</text>

  <rect class="node" x="318" y="160" width="184" height="58" rx="8"/>
  <text class="name" x="336" y="186">操作トレース</text>
  <text class="sub" x="336" y="206">compare / swap / visit …</text>

  <rect class="node-accent" x="582" y="160" width="150" height="58" rx="8"/>
  <text class="name-accent" x="600" y="186">Player</text>
  <text class="sub" x="600" y="206">rAFで逐次適用</text>

  <rect class="node" x="772" y="160" width="120" height="58" rx="8"/>
  <text class="name" x="790" y="186">SVG描画</text>
  <text class="sub" x="790" y="206">棒 / 迷路</text>

  <path class="flow" d="M218 149 C260 149 276 184 314 188" marker-end="url(#head)"/>
  <path class="flow" d="M218 229 C260 229 276 194 314 190" marker-end="url(#head)"/>
  <path class="flow" d="M502 189 H 578" marker-end="url(#head)"/>
  <path class="flow" d="M732 189 H 768" marker-end="url(#head)"/>
</svg>
