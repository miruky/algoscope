<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 230" role="img" aria-label="algoscopeのアーキテクチャ図">
  <title>algoscopeのアーキテクチャ</title>
  <style>
    .box { fill: none; stroke: #8b949e; stroke-width: 1.5; }
    .accent-box { fill: none; stroke: #7a8fe6; stroke-width: 1.5; }
    .label { font: 600 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #6b7280; }
    .small { font: 400 11.5px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #6b7280; }
    .accent-label { font: 700 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #4f6bd8; }
    .arrow { stroke: #8b949e; stroke-width: 1.5; fill: none; marker-end: url(#head); }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8z" fill="#8b949e"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="170" height="64" rx="8" class="accent-box"/>
  <text x="40" y="46" class="accent-label">sorts.ts</text>
  <text x="40" y="68" class="small">6アルゴリズムのトレース</text>

  <rect x="20" y="140" width="170" height="64" rx="8" class="accent-box"/>
  <text x="40" y="166" class="accent-label">graphsearch.ts</text>
  <text x="40" y="188" class="small">BFS / DFS / ダイクストラ</text>

  <rect x="280" y="80" width="180" height="70" rx="8" class="box"/>
  <text x="300" y="108" class="label">操作トレース</text>
  <text x="300" y="130" class="small">compare / swap / visit...</text>

  <rect x="540" y="80" width="150" height="70" rx="8" class="accent-box"/>
  <text x="560" y="108" class="accent-label">Player</text>
  <text x="560" y="130" class="small">rAFで逐次適用</text>

  <rect x="760" y="80" width="120" height="70" rx="8" class="box"/>
  <text x="780" y="108" class="label">SVG描画</text>
  <text x="780" y="130" class="small">棒 / 迷路</text>

  <path class="arrow" d="M190 52 C230 60 240 80 272 95"/>
  <path class="arrow" d="M190 172 C230 164 240 145 272 135"/>
  <path class="arrow" d="M460 115 H532"/>
  <path class="arrow" d="M690 115 H752"/>
</svg>
